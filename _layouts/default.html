---

<!DOCTYPE html>
<html lang="en">
{% include head.html %}
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3EP7KLCYVP"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag() { dataLayer.push(arguments); }
  gtag('js', new Date());
  gtag('config', 'G-3EP7KLCYVP');
</script>

<body{% if page.body_class %} class="{{ page.body_class }}"{% endif %}>

  <nav class="home-rail">
    <div class="home-rail-top">
      <a class="home-wordmark" href="{{ '/' | relative_url }}">{{ site.author.name }}</a>
      <button class="home-hamburger" id="home-hamburger" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
    <ul class="home-rail-links" id="home-rail-links">
      <li><a href="{{ '/about/' | relative_url }}">About</a></li>
      <li><a href="{{ '/blog/' | relative_url }}">Musings</a></li>
      <li><a href="{{ '/photos/' | relative_url }}">Memories</a></li>
    </ul>
    <div class="home-rail-bottom">
      <button title="Change theme" id="theme-toggle" onclick="modeSwitcher()">
        <div></div>
      </button>
    </div>
  </nav>

  <div class="home-content">
    {% include anchor_headings.html html=content anchorBody="#" %}
  </div>

  <script>
    function setTheme(theme) {
      if (theme === "dark") {
        document.documentElement.setAttribute('data-theme', 'dark');
        window.localStorage.setItem('theme', 'dark');
        document.getElementById("theme-toggle").classList.add('sun');
        document.getElementById("theme-toggle").classList.remove('moon');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
        window.localStorage.setItem('theme', 'light');
        document.getElementById("theme-toggle").classList.add('moon');
        document.getElementById("theme-toggle").classList.remove('sun');
      }
    }

    let theme = localStorage.getItem('theme');
    theme = theme || (window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light' : 'light');
    setTheme(theme);

    function modeSwitcher() {
      let currentMode = document.documentElement.getAttribute('data-theme');
      if (currentMode === "dark") {
        setTheme('light');
      } else {
        setTheme('dark');
      }
    }

    document.getElementById('home-hamburger').addEventListener('click', function() {
      document.body.classList.toggle('nav-open');
    });
  </script>

  {% if page.url == '/' %}
  <script src="{{ '/assets/js/simple-jekyll-search.js' | relative_url }}"></script>
  <script>
    var sjs = SimpleJekyllSearch({
      searchInput: document.getElementById('search-input'),
      resultsContainer: document.getElementById('search-results'),
      json: '{{ '/search.json' | relative_url }}',
      searchResultTemplate: '<li><a href="{url}" title="{description}">{title}</a></li>',
      noResultsText: 'No results found..',
      limit: 10,
      fuzzy: true,
    });
  </script>
  {% endif %}

</body>

<footer class="social-footer">
  <div class="social-footer-icons">
    <a href="https://github.com/frankkbyang" title="Github profile" target="_blank" rel="noopener noreferrer"><i class="fa fa-github" aria-hidden="true"></i></a>
    <a href="{{ '/atom.xml' | relative_url }}" title="Feed RSS" target="_blank" rel="noopener noreferrer"><i class="fa fa-rss" aria-hidden="true"></i></a>
    <a href="https://github.com/frankkbyang/frankkbyang.github.io" title="Browse the code" target="_blank" rel="noopener noreferrer"><i class="fa fa-code" aria-hidden="true"></i></a>
  </div>
</footer>

</html>
