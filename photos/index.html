<script>
document.addEventListener('DOMContentLoaded', function() {
  var thumbs = document.querySelectorAll('.gallery-thumbs img');
  var previewImg = document.getElementById('gallery-img');
  var caption = document.getElementById('gallery-caption');
  thumbs.forEach(function(thumb) {
    thumb.addEventListener('click', function() {
      thumbs.forEach(function(t) { t.classList.remove('active'); });
      thumb.classList.add('active');
      previewImg.src = thumb.dataset.lg;
      previewImg.alt = thumb.dataset.title;
      caption.textContent = thumb.dataset.title;
    });
  });
});
</script>
